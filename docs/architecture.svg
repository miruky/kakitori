<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="kakitoriのアーキテクチャ図">
  <title>kakitoriのアーキテクチャ: 筆順データから手書き判定、習熟記録までの流れ</title>
  <style>
    .box { fill: #fefdf9; stroke: #ddd7c4; rx: 10; }
    .zone { fill: #f0ede3; stroke: #e3decf; rx: 14; }
    .t { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; fill: #29251c; }
    .h { font-size: 13px; font-weight: 600; }
    .s { font-size: 11px; fill: #6f6a5c; }
    .zl { font-size: 11px; font-weight: 600; fill: #a8741a; letter-spacing: 1px; }
    .arrow { stroke: #6f6a5c; stroke-width: 1.6; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { fill: #201d16; stroke: #383327; }
      .zone { fill: #1a1812; stroke: #29251c; }
      .t { fill: #eae6db; }
      .s { fill: #a59d8b; }
      .zl { fill: #e0b04e; }
      .arrow { stroke: #a59d8b; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#6f6a5c"/>
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="740" height="92"/>
  <text class="t zl" x="36" y="44">データ(src/lib/data)</text>
  <rect class="box" x="36" y="56" width="344" height="44"/>
  <text class="t h" x="52" y="76">strokes.ts(KanjiVG由来・生成物)</text>
  <text class="t s" x="52" y="92">小学1年80字の筆順つきSVGパス。fetch-kanjivg.mjsが生成</text>
  <rect class="box" x="400" y="56" width="344" height="44"/>
  <text class="t h" x="416" y="76">readings.ts</text>
  <text class="t s" x="416" y="92">読みとかな書きの用例。暗書きテストの出題文になる</text>

  <path class="arrow" d="M208 112 V140"/>
  <path class="arrow" d="M572 112 V300"/>

  <rect class="box" x="36" y="144" width="344" height="64"/>
  <text class="t h" x="52" y="166">path.ts</text>
  <text class="t s" x="52" y="183">SVGパスを折れ線へ展開し、弧長で等間隔に</text>
  <text class="t s" x="52" y="198">リサンプリングする</text>

  <path class="arrow" d="M208 208 V236"/>

  <rect class="box" x="36" y="240" width="344" height="64"/>
  <text class="t h" x="52" y="262">judge.ts</text>
  <text class="t s" x="52" y="279">書き始め・書き終わり・形・長さを照合。</text>
  <text class="t s" x="52" y="294">逆順の線は対応点の距離で自然に弾く</text>

  <path class="arrow" d="M208 304 V332"/>

  <rect class="zone" x="20" y="336" width="740" height="44"/>
  <text class="t h" x="36" y="362">UI(main.ts)</text>
  <text class="t s" x="160" y="362">pointerイベントで筆跡を集め、1画ずつ判定。なぞり/暗書きの2モード、習熟はlocalStorageへ</text>
</svg>
